[build]
target = "aarch64-unknown-none"

[target.aarch64-unknown-none]
# `-Zfixed-x18` (nightly only) replaces the rust-deprecated
# `-C target-feature=+reserve-x18` per rust-lang/rust#116344. Bat_OS
# pins a nightly via `rust-toolchain.toml`, so we get the modern flag.
rustflags = ["-C", "link-arg=-Tlinker.ld", "-Zfixed-x18"]

[unstable]
build-std = ["core", "alloc"]
