[build]
target = "aarch64-unknown-none"

[target.aarch64-unknown-none]
# `-C target-feature=+reserve-x18` is rust-deprecated (rust-lang#116344) in
# favour of `-Zfixed-x18`, but `-Zfixed-x18` requires nightly. We're on stable
# (rust-toolchain matches the system default — see rustup show), so we keep the
# deprecated flag and accept the one warning rustc prints. Migrate when we move
# to a nightly-pinned toolchain (separate effort: many `[unstable]` flags need
# review at the same time).
rustflags = ["-C", "link-arg=-Tlinker.ld", "-C", "target-feature=+reserve-x18"]

[unstable]
build-std = ["core", "alloc"]
